<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Resultado de la Consulta</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

/* PAGINA REAL */
iframe{
    width:100%;
    height:100vh;
    border:none;
}

/* OVERLAY */
.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

/* MODAL */
.modal{
    background:#fff;
    width:78%;
    max-width:1020px;
    max-height:88vh;
    border-radius:8px;
    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

/* HEADER */
.modal-header{
    padding:14px 20px;
    font-size:22px;
    font-weight:bold;
}

/* CLOSE */
.close-btn{
    position:absolute;
    top:10px;
    right:15px;
    font-size:26px;
    cursor:pointer;
}

/* CONTENT */
.modal-content{
    flex:1;
    overflow-y:auto;
    padding:16px;
}

/* BLUE BORDER */
.border-blue{
    background:#3f4c5f;
    padding:16px;
}

/* BLACK BOX */
.black-box{
    background:#2f2f2f;
    padding:22px 24px;
}

/* TOP ROW */
.logo-row{
    display:flex;
    gap:24px;
    align-items:center;
    justify-content:center;
}

/* LOGO */
.logo img{
    width:165px;
}

/* INFO AREA */
.info-area{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* INFO BOX */
.info-box{
    background:#fdeaea;
    color:#7a1c1c;
    padding:10px;
    font-size:12px;
    text-align:center;
    max-width:360px;
}

/* TOP BUTTONS */
.top-buttons{
    margin-top:10px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

.btn-green,.btn-blue{
    padding:8px 18px;
    border-radius:22px;
    border:none;
    font-size:13px;
    font-weight:bold;
    color:#fff;
}

.btn-green{ background:#00c853; }
.btn-blue{ background:#4c5bff; }

/* IMAGE CONTAINER */
.image-container{
    background:#fff7cc;
    margin-top:16px;
}

/* IMAGE HEADER */
.image-header{
    padding:12px;
    text-align:center;
    font-size:13px;
}

.buscar{ color:#1aa34a; font-weight:bold; }
.label{ color:#000; }
.value{ color:#1aa34a; font-weight:bold; }

/* IMAGE BODY */
.image-body{
    height:320px;
    overflow-y:auto;
    padding:8px;
}

.image-body img{
    width:100%;
    display:block;
}

/* FOOTER */
.image-footer{
    background:#fff3bf;
    padding:14px;
    display:flex;
    justify-content:center;
    gap:18px;
}

.btn-rejap{
padding:10px 22px;
    border-radius:22px;
    border:none;
    font-size:14px;
}

.btn-estado{
    padding:10px 22px;

    border:none;
    font-size:14px;
}

.btn-rejap{ background:#c9f2f2; color:#0b6623; }
.btn-estado{ background:#2ecc71; color:#0b6623; }

.btn-estado span{
    color:#ffeb3b;
    font-weight:bold;
}

/* ===================== */
/* 📱 MODAL MÓVIL REAL */
/* ===================== */
@media (max-width:768px){

    .modal{
        width:94%;
        max-height:88vh;
        border-radius:12px;
    }

    .modal-header{
        font-size:18px;
        text-align:center;
    }

    .logo-row{
        flex-direction:column;
        gap:12px;
    }

    .logo img{
        width:160px;
    }

    .info-box{
        font-size:13px;
        width:100%;
    }

    .top-buttons{
        flex-direction:column;
        width:100%;
    }

    .top-buttons button{
        width:100%;
        padding:14px;
        font-size:15px;
    }

    .image-header{
        font-size:14px;
    }

   .image-body {
    height: 45vh;       /* altura fija relativa a la ventana */
    width: 100%;        /* ocupa todo el ancho disponible */
    overflow: auto;     /* activa scroll vertical y horizontal */
    padding: 8px;
}

.image-body img {
    max-width: 100%;    /* la imagen nunca se expande más allá del contenedor */
    height: auto;       /* mantiene proporción */
    display: block;
}


    .image-footer{
        flex-direction:column;
    }

    .btn-rejap,
    .btn-estado{
        width:100%;
        padding:14px;
        font-size:15px;
    }
}
</style>
</head>

<body>

<iframe src="https://magistraturaverifica.organojudicial.gob.bo/"></iframe>

<div class="modal-overlay" id="modal">
<div class="modal">

<div class="modal-header">Resultado de la Consulta</div>
<div class="close-btn" onclick="cerrarModal()">×</div>

<div class="modal-content">
<div class="border-blue">
<div class="black-box">

<div class="logo-row">
    <div class="logo"><img src="logo.png"></div>

    <div class="info-area">
        <div class="info-box">
            <strong>Importante:</strong> Si los datos coinciden con el documento impreso,
            el certificado se considera válido; caso contrario es inválido.
        </div>

        <div class="top-buttons">
            <button class="btn-green">Respuesta Obtenida</button>
            <button class="btn-blue">N° Consulta: 002-3752</button>
        </div>
    </div>
</div>

<div class="image-container">
    <div class="image-header">
        <span class="buscar">Buscar:</span>
        <span class="value">df8ff891-9a6c-4f1a-920a-62a2698044c4</span><br>
        <span class="label">Emisión:</span>
        <span class="value">17/06/2026</span>
        &nbsp;
        <span class="label">Validez:</span>
        <span class="value">17/06/2027</span>
    </div>

    <div class="image-body">
        <img src="certificado.jpg">
    </div>

    <div class="image-footer">
        <button class="btn-rejap">REJAP</button>
        <button class="btn-estado">Estado: <span>VIGENTE</span></button>
    </div>
</div>

</div>
</div>
</div>

</div>
</div>

<script>
function cerrarModal(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
